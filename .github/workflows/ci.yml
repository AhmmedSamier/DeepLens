name: CI

on:
    push:
        branches: ['master']
    pull_request:
        branches: ['master']
    workflow_dispatch:

permissions:
    contents: read

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    lint:
        runs-on: ubuntu-24.04
        timeout-minutes: 5
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest
                  cache: true

            - name: Install Dependencies
              run: |
                  cd language-server && bun install --frozen-lockfile
                  cd ../vscode-extension && bun install --frozen-lockfile

            - name: Lint Language Server
              working-directory: language-server
              run: bun run lint

            - name: Lint VS Code Extension
              working-directory: vscode-extension
              run: bun run lint

    test-language-server:
        runs-on: ubuntu-24.04
        needs: lint
        timeout-minutes: 10
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest
                  cache: true

            - name: Install Dependencies
              working-directory: language-server
              run: bun install --frozen-lockfile

            - name: Run Language Server Tests
              working-directory: language-server
              run: bun run test

    test-vscode-extension:
        runs-on: ubuntu-24.04
        needs: [lint, test-language-server]
        timeout-minutes: 15
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest
                  cache: true

            - name: Install Dependencies
              run: |
                  cd language-server && bun install --frozen-lockfile
                  cd ../vscode-extension && bun install --frozen-lockfile

            - name: Install Linux Dependencies
              run: |
                  sudo apt-get update -yq
                  sudo apt-get install -yq --no-install-recommends xvfb libasound2 libatk1.0-0 libgbm1 libgtk-3-0 libnss3 libxkbfile1 libxss1

            - name: Run VS Code Extension Tests
              working-directory: vscode-extension
              run: xvfb-run -a bun run test

    benchmarks:
        runs-on: ubuntu-24.04
        needs: [lint, test-language-server, test-vscode-extension]
        timeout-minutes: 20
        if: |
            (github.event_name == 'push' && github.ref == 'refs/heads/master') ||
            github.event_name == 'workflow_dispatch'
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest
                  cache: true

            - name: Install Dependencies
              run: |
                  cd language-server && bun install --frozen-lockfile
                  cd ../vscode-extension && bun install --frozen-lockfile

            - name: Install Linux Dependencies (for extension benchmarks)
              run: |
                  sudo apt-get update -yq
                  sudo apt-get install -yq --no-install-recommends xvfb libasound2 libatk1.0-0 libgbm1 libgtk-3-0 libnss3 libxkbfile1 libxss1

            - name: Run Benchmarks
              run: |
                  chmod +x run_benchmarks.sh
                  ./run_benchmarks.sh

            - name: Upload Benchmark Report
              if: always()
              run: |
                  if [ -f benchmark_report.md ]; then
                    cat benchmark_report.md >> $GITHUB_STEP_SUMMARY
                  fi

            - name: Upload Benchmark Artifact
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: benchmark-report
                  path: benchmark_report.md
