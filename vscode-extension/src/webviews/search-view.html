<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'nonce-${nonce}' ${webview.cspSource}; font-src 'self' ${webview.cspSource}; script-src 'nonce-${nonce}';">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style nonce="${nonce}">
        @font-face {
            font-family: "codicon";
            font-display: block;
            src: url("${codiconTtfUri}") format("truetype");
        }
        .codicon[class*='codicon-'] {
            font: normal normal normal 16px/1 codicon;
            display: inline-block;
            text-decoration: none;
            text-rendering: auto;
            text-align: center;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            user-select: none;
            -webkit-user-select: none;
            -ms-user-select: none;
        }
        .codicon-search:before { content: "\ea6d"; }
        .codicon-file:before { content: "\ea7b"; }
        .codicon-symbol-class:before { content: "\eb5b"; }
        .codicon-symbol-method:before { content: "\ea8c"; }
        .codicon-whole-word:before { content: "\eb7e"; }
        .codicon-book:before { content: "\eaa4"; }
        .codicon-git-merge:before { content: "\eafe"; }
        .codicon-run:before { content: "\eb2c"; }
        .codicon-symbol-property:before { content: "\eb65"; }
        .codicon-globe:before { content: "\eb01"; }
        .codicon-stop-circle:before { content: "\eba5"; }
        .codicon-copy:before { content: "\ebcc"; }
        .codicon-history:before { content: "\ea82"; }
        .codicon-light-bulb:before { content: "\ea61"; }
        .codicon-search-fuzzy:before { content: "\ec0d"; }
        .codicon-refresh:before { content: "\eb37"; }
        .codicon-trash:before { content: "\ea81"; }
        .codicon-clear-all:before { content: "\eb2f"; }
        .codicon-settings-gear:before { content: "\eb51"; }
        .codicon-split-horizontal:before { content: "\eb56"; }
        .codicon-folder-opened:before { content: "\eaf7"; }
        .codicon-references:before { content: "\eb1e"; }
        .codicon-file-submodule:before { content: "\eafd"; }
        body {
            padding: 10px;
            color: var(--vscode-foreground);
            font-family: var(--vscode-font-family);
        }
        .search-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 12px;
        }
        input {
            width: 100%;
            padding: 4px 8px;
            background: var(--vscode-input-background);
            color: var(--vscode-input-foreground);
            border: 1px solid var(--vscode-input-border);
            border-radius: 2px;
        }
        input:focus {
            outline: 1px solid var(--vscode-focusBorder);
        }
        .scope-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }
        .search-controls {
            display: flex;
            gap: 4px;
        }
        .search-summary {
            margin-top: 4px;
            font-size: 11px;
            color: var(--vscode-descriptionForeground);
            min-height: 16px;
        }
        .pro-tip {
            padding: 8px;
            background: var(--vscode-input-background);
            border-radius: 3px;
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .pro-tip-icon {
            color: var(--vscode-textLink-foreground);
            font-size: 14px;
        }
        .empty-state {
            padding: 10px;
            color: var(--vscode-descriptionForeground);
            font-style: italic;
        }
        .empty-state-actions {
            margin-top: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .empty-state-btn {
            padding: 8px 12px;
            background: var(--vscode-button-secondaryBackground);
            color: var(--vscode-button-secondaryForeground);
            border: 1px solid transparent;
            border-radius: 2px;
            cursor: pointer;
            text-align: left;
        }
        .empty-state-btn:hover {
            background: var(--vscode-button-secondaryHoverBackground);
        }
        .scope-button {
            padding: 2px 6px;
            font-size: 11px;
            background: var(--vscode-button-secondaryBackground);
            color: var(--vscode-button-secondaryForeground);
            border: 1px solid transparent;
            border-radius: 2px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .scope-button:hover {
            background: var(--vscode-button-secondaryHoverBackground);
        }
        .scope-button.active {
            background: var(--vscode-button-background);
            color: var(--vscode-button-foreground);
        }
        .scope-button.active:hover {
            background: var(--vscode-button-hoverBackground);
        }
        .results-container {
            display: flex;
            flex-direction: column;
        }
        .result-item {
            padding: 1px 8px 1px 4px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            position: relative;
            min-height: 22px;
            box-sizing: border-box;
        }
        .result-item:hover {
            background: var(--vscode-list-hoverBackground);
            color: var(--vscode-list-hoverForeground);
        }
        .result-item.selected {
            background: var(--vscode-list-activeSelectionBackground);
            color: var(--vscode-list-activeSelectionForeground);
            outline: 1px solid var(--vscode-list-focusOutline, transparent);
            outline-offset: -1px;
        }
        .result-item:hover .result-actions,
        .result-item.selected .result-actions {
            display: flex;
        }
        .result-row {
            display: flex;
            align-items: center;
            gap: 5px;
            overflow: hidden;
            line-height: 22px;
            height: 22px;
        }
        .result-icon {
            flex-shrink: 0;
            width: 16px;
            height: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            margin-left: 2px;
            opacity: 0.8;
        }
        .result-label {
            flex: 1;
            font-size: 13px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            min-width: 0;
        }
        .result-desc {
            font-size: 12px;
            color: var(--vscode-descriptionForeground);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex-shrink: 1;
            min-width: 0;
            max-width: 45%;
            padding-right: 4px;
        }
        .result-item.selected .result-desc {
            color: var(--vscode-list-activeSelectionForeground);
            opacity: 0.8;
        }
        .result-match {
            font-weight: 600;
            color: var(--vscode-list-highlightForeground);
        }
        .result-item.selected .result-match {
            color: var(--vscode-list-activeSelectionForeground);
            text-decoration: underline;
        }
        .result-detail {
            display: flex;
            font-size: 11px;
            color: var(--vscode-descriptionForeground);
            opacity: 0.65;
            white-space: nowrap;
            overflow: hidden;
            padding-left: 23px;
            line-height: 16px;
            padding-bottom: 2px;
        }
        .result-detail-dir {
            overflow: hidden;
            text-overflow: ellipsis;
            direction: rtl;
            unicode-bidi: bidi-override;
            text-align: left;
            flex-shrink: 1;
            min-width: 0;
        }
        .result-detail-file {
            flex-shrink: 0;
            white-space: nowrap;
        }
        .recent-badge {
            font-size: 10px;
            color: var(--vscode-textLink-foreground);
            background: var(--vscode-badge-background);
            color: var(--vscode-badge-foreground);
            padding: 1px 6px;
            border-radius: 8px;
            margin-left: 6px;
            flex-shrink: 0;
        }
        .result-actions {
            display: none;
            align-items: center;
            gap: 2px;
            margin-left: auto;
            flex-shrink: 0;
        }
        .result-action-btn {
            border: none;
            background: transparent;
            color: var(--vscode-descriptionForeground);
            cursor: pointer;
            padding: 1px 4px;
            border-radius: 2px;
            font-size: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .result-action-btn:hover {
            background: var(--vscode-toolbar-hoverBackground);
            color: var(--vscode-foreground);
        }
        .codicon {
            display: inline-block;
            margin-right: 3px;
        }
    </style>
</head>
<body>
    <div class="search-container">
        <div class="scope-buttons" id="scope-buttons">
            <button class="scope-button active" data-scope="everything" title="Search Everything"><i class="codicon codicon-search"></i> All</button>
            <button class="scope-button" data-scope="files" title="Search Files"><i class="codicon codicon-file"></i> Files</button>
            <button class="scope-button" data-scope="types" title="Search Classes &amp; Interfaces"><i class="codicon codicon-symbol-class"></i> Classes</button>
            <button class="scope-button" data-scope="symbols" title="Search Methods &amp; Functions"><i class="codicon codicon-symbol-method"></i> Symbols</button>
            <button class="scope-button" data-scope="text" title="Search Text Content"><i class="codicon codicon-whole-word"></i> Text</button>
            <button class="scope-button" data-scope="open" title="Search Open Files"><i class="codicon codicon-book"></i> Open</button>
            <button class="scope-button" data-scope="modified" title="Search Modified Files"><i class="codicon codicon-git-merge"></i> Modified</button>
            <button class="scope-button" data-scope="commands" title="Run VS Code Commands"><i class="codicon codicon-run"></i> Commands</button>
            <button class="scope-button" data-scope="properties" title="Search Properties"><i class="codicon codicon-symbol-property"></i> Properties</button>
            <button class="scope-button" data-scope="endpoints" title="Search API Endpoints"><i class="codicon codicon-globe"></i> Endpoints</button>
        </div>
        <input type="text" id="search-input" placeholder="Search everywhere..." autocomplete="off" spellcheck="false" aria-label="Search everywhere">

        <div id="search-summary" class="search-summary" aria-live="polite" aria-atomic="true"></div>
    </div>
    <div id="results" class="results-container"></div>

    <script nonce="${nonce}">
        const vscode = acquireVsCodeApi();
        const searchInput = document.getElementById('search-input');
        const resultsContainer = document.getElementById('results');
        const scopeButtons = document.querySelectorAll('.scope-button');
        const summaryEl = document.getElementById('search-summary');

        let currentScope = 'everything';
        let userScope = 'everything';
        let results = [];
        let slashCommands = [];
        let visibleEntries = [];
        let selectedIndex = -1;
        let textSearchEnabled = true;
        let recentHistoryMode = false;
        let confirmClearHistory = false;

        const slashCommandScopes = ${SLASH_COMMAND_SCOPES};

        function isSlashTriggerQuery(rawQuery) {
            const trimmed = rawQuery.trimStart();
            return trimmed.startsWith('/') || trimmed.startsWith('#') || trimmed.startsWith('>');
        }

        function setTextSearchEnabled(enabled) {
            textSearchEnabled = enabled;
            scopeButtons.forEach((button) => {
                if (button.getAttribute('data-scope') !== 'text') {
                    return;
                }
                button.disabled = !enabled;
                button.style.opacity = enabled ? '1' : '0.5';
                button.title = enabled ? 'Search Text Content' : 'Text search unavailable (ripgrep missing)';
            });

            if (!enabled && currentScope === 'text') {
                currentScope = 'everything';
                userScope = 'everything';
                updateScopeButtons();
            }

            updateSummary();
        }

        function resolveQueryAndScope(rawQuery) {
            const trimmed = rawQuery.trimStart();
            // Match a prefix token: starts with /, #, or > and includes any non-space characters, REQUIRED to be followed by space
            const m = trimmed.match(/^([\/#>]\S*)\s+/);
            if (m) {
                const prefix = m[1].toLowerCase();
                const scopeEntry = slashCommandScopes[prefix];
                if (scopeEntry) {
                    return { scope: scopeEntry.scope, detectedScope: scopeEntry.scope };
                }
            }
            return { scope: userScope, detectedScope: null };
        }

        function stripLeadingScopeToken(rawQuery) {
            const trimmed = rawQuery.trimStart();
            // Remove the token and the spaces after it
            return trimmed.replace(/^([\/#>]\S*)\s+/, '');
        }

        function setActiveScopeButton(scope) {
            scopeButtons.forEach(b => {
                b.classList.toggle('active', b.getAttribute('data-scope') === scope);
            });
        }

        function updateScopeButtons() {
            setActiveScopeButton(currentScope);
            updateSummary();
        }

        function getScopeLabel(scope) {
            const labels = {
                everything: 'Everything',
                open: 'Open Files',
                modified: 'Modified Files',
                types: 'Classes',
                symbols: 'Symbols',
                files: 'Files',
                text: 'Text',
                commands: 'Commands',
                properties: 'Properties',
                endpoints: 'Endpoints',
            };
            return labels[scope] || 'Everything';
        }

        function updateSummary(customText) {
            if (!summaryEl) {
                return;
            }

            if (customText) {
                summaryEl.textContent = customText;
                return;
            }

            const scopeLabel = getScopeLabel(currentScope);
            if (recentHistoryMode) {
                summaryEl.textContent = 'Recent History (' + results.length + ')';
                return;
            }

            if (isSlashTriggerQuery(searchInput.value) && slashCommands.length > 0) {
                const recentCount = slashCommands.filter((cmd) => cmd.recent).length;
                const recentSuffix = recentCount > 0 ? ', ' + recentCount + ' recent' : '';
                summaryEl.textContent = scopeLabel + ': ' + slashCommands.length + ' slash commands' + recentSuffix;
                return;
            }

            summaryEl.textContent = scopeLabel + ': ' + results.length + ' results';
        }

        function triggerSearchFromInput(raw) {
            const { scope, detectedScope } = resolveQueryAndScope(raw);
            let effectiveQuery = raw;

            if (detectedScope && detectedScope !== currentScope) {
                currentScope = detectedScope;
                setActiveScopeButton(currentScope);

                effectiveQuery = stripLeadingScopeToken(raw);
                if (searchInput.value !== effectiveQuery) {
                    searchInput.value = effectiveQuery;
                }
            } else if (!detectedScope && userScope !== currentScope) {
                currentScope = userScope;
                setActiveScopeButton(currentScope);
            }

            if (isSlashTriggerQuery(effectiveQuery)) {
                vscode.postMessage({ type: 'getSlashCommands', query: effectiveQuery });
            } else {
                slashCommands = [];
            }

            vscode.postMessage({ type: 'search', query: effectiveQuery, scope: currentScope });
        }

        searchInput.addEventListener('input', (e) => {
            triggerSearchFromInput(e.target.value);
        });

        scopeButtons.forEach(button => {
            button.addEventListener('click', () => {
                const newScope = button.getAttribute('data-scope');
                if (!textSearchEnabled && newScope === 'text') {
                    return;
                }
                if (currentScope !== newScope) {
                    currentScope = newScope;
                    userScope = newScope;
                    const strippedQuery = stripLeadingScopeToken(searchInput.value);
                    if (searchInput.value !== strippedQuery) {
                        searchInput.value = strippedQuery;
                    }
                    setActiveScopeButton(currentScope);
                    vscode.postMessage({
                        type: 'search',
                        query: strippedQuery,
                        scope: currentScope
                    });
                }
            });
        });

        updateScopeButtons();

        let lastRenderedRequestId = 0;

        window.addEventListener('message', event => {
            const message = event.data;
            switch (message.type) {
                case 'results':
                    if (message.requestId >= lastRenderedRequestId) {
                        lastRenderedRequestId = message.requestId;
                        results = message.results;
                        recentHistoryMode = message.isRecentHistory === true;
                        if (!recentHistoryMode) {
                            confirmClearHistory = false;
                        }
                        renderResults();
                    }
                    break;
                case 'status':
                    showStatus(message.message);
                    updateSummary(message.message);
                    break;
                case 'slashCommands':
                    slashCommands = message.commands || [];
                    renderResults();
                    break;
                case 'capabilities':
                    setTextSearchEnabled(message.textSearchEnabled !== false);
                    break;
            }
        });

        function showStatus(message) {
            const existing = document.querySelector('.status-message');
            if (existing) {
                existing.remove();
            }
            const statusEl = document.createElement('div');
            statusEl.className = 'status-message';
            statusEl.textContent = message;
            statusEl.style.cssText = 'padding: 8px; background: var(--vscode-banner-background); color: var(--vscode-banner-foreground); border-radius: 3px; display: flex; align-items: center; gap: 8px; margin-bottom: 12px;';
            resultsContainer.parentNode.insertBefore(statusEl, resultsContainer);
            setTimeout(() => statusEl.remove(), 2000);
        }

        function renderResults() {
            resultsContainer.innerHTML = '';
            selectedIndex = -1;
            visibleEntries = [];

            const showSlashCommands = isSlashTriggerQuery(searchInput.value) && slashCommands.length > 0;
            if (showSlashCommands) {
                renderSlashCommands();
                updateSummary();
                return;
            }

            if (results.length === 0) {
                renderEmptyState();
                updateSummary();
                return;
            }

            if (recentHistoryMode) {
                renderHistoryToolbar();
            }

            if (results.length === 0 && searchInput.value.trim() !== '') {
                const emptyDiv = document.createElement('div');
                emptyDiv.style.padding = '20px 10px';
                emptyDiv.style.textAlign = 'center';
                emptyDiv.style.color = 'var(--vscode-descriptionForeground)';

                const messageDiv = document.createElement('div');
                messageDiv.style.marginBottom = '12px';
                messageDiv.textContent = `No results found for '${searchInput.value}'`;

                const clearBtn = document.createElement('button');
                clearBtn.className = 'scope-button';
                clearBtn.style.padding = '4px 12px';
                clearBtn.style.fontSize = '12px';
                clearBtn.textContent = 'Clear Search';

                emptyDiv.appendChild(messageDiv);
                emptyDiv.appendChild(clearBtn);

                resultsContainer.appendChild(emptyDiv);

                clearBtn.addEventListener('click', () => {
                    searchInput.value = '';
                    currentScope = 'everything';
                    scopeButtons.forEach(b => {
                        b.classList.remove('active');
                        if (b.getAttribute('data-scope') === 'everything') {
                            b.classList.add('active');
                        }
                    });
                    vscode.postMessage({
                        type: 'search',
                        query: '',
                        scope: 'everything'
                    });
                });
                return;
            }

            results.forEach((result, index) => {
                const item = result.item;
                const div = document.createElement('div');
                div.className = 'result-item';

                // Row 1: icon + label + description
                const row1 = document.createElement('div');
                row1.className = 'result-row';

                // Get icon for item type
                const iconClass = getIconForItemType(item.type);
                if (iconClass) {
                    const icon = document.createElement('i');
                    icon.className = `codicon codicon-${iconClass} result-icon`;
                    row1.appendChild(icon);
                } else {
                    const iconPlaceholder = document.createElement('span');
                    iconPlaceholder.className = 'result-icon';
                    row1.appendChild(iconPlaceholder);
                }

                // Highlighted label using match positions
                const labelSpan = renderHighlightedLabel(item.name, result.highlights);
                labelSpan.className = 'result-label';
                row1.appendChild(labelSpan);

                // Description (container name) shown to the right of label on same row
                if (item.containerName) {
                    const descSpan = document.createElement('span');
                    descSpan.className = 'result-desc';
                    descSpan.textContent = item.containerName;
                    row1.appendChild(descSpan);
                }

                div.appendChild(row1);

                // Detail: split into dir (truncate-left) + basename:line (stable right)
                if (item.type !== 'command' && item.filePath) {
                    const relativePath = getRelativePath(item.filePath);
                    const slashIdx = Math.max(relativePath.lastIndexOf('/'), relativePath.lastIndexOf('\\\\'));
                    const dir = slashIdx >= 0 ? relativePath.slice(0, slashIdx + 1) : '';
                    const base = slashIdx >= 0 ? relativePath.slice(slashIdx + 1) : relativePath;
                    const lineInfo = item.line !== undefined ? `:${item.line + 1}` : '';
                    
                    const detailDiv = document.createElement('div');
                    detailDiv.className = 'result-detail';
                    
                    if (dir) {
                        const dirSpan = document.createElement('span');
                        dirSpan.className = 'result-detail-dir';
                        dirSpan.textContent = dir;
                        detailDiv.appendChild(dirSpan);
                    }
                    
                    const fileSpan = document.createElement('span');
                    fileSpan.className = 'result-detail-file';
                    fileSpan.textContent = base + lineInfo;
                    detailDiv.appendChild(fileSpan);
                    
                    div.appendChild(detailDiv);
                }

                // Add result actions
                const actionsContainer = document.createElement('div');
                actionsContainer.className = 'result-actions';
                renderResultActions(item, actionsContainer);
                div.appendChild(actionsContainer);

                div.addEventListener('click', () => {
                    selectItem(index);
                    vscode.postMessage({ type: 'preview', result });
                });

                div.addEventListener('dblclick', () => {
                    vscode.postMessage({ type: 'open', result });
                });

                div.querySelectorAll('.result-action-btn').forEach((button) => {
                    button.addEventListener('click', (event) => {
                        event.stopPropagation();
                        const action = button.getAttribute('data-action');
                        if (action) {
                            if (action === 'removeHistory') {
                                vscode.postMessage({ type: 'removeHistoryItem', itemId: result.item.id });
                                return;
                            }
                            vscode.postMessage({ type: action, result });
                        }
                    });
                });

                resultsContainer.appendChild(div);
                visibleEntries.push({ kind: 'result', result });
            });

            updateSummary();
        }

        function renderSlashCommands() {
            slashCommands.forEach((command, index) => {
                const div = document.createElement('div');
                div.className = 'result-item';

                // Row 1: icon + label + description
                const row1 = document.createElement('div');
                row1.className = 'result-row';

                // Icon
                const iconClass = command.icon || 'run';
                const icon = document.createElement('i');
                icon.className = `codicon codicon-${iconClass} result-icon`;
                row1.appendChild(icon);

                // Label
                const labelSpan = document.createElement('span');
                labelSpan.className = 'result-label';
                labelSpan.textContent = command.name || command.id || '/command';
                row1.appendChild(labelSpan);

                // Description
                if (command.description) {
                    const descSpan = document.createElement('span');
                    descSpan.className = 'result-desc';
                    descSpan.textContent = command.description;
                    row1.appendChild(descSpan);
                }

                div.appendChild(row1);

                // Recent badge (shown on same line as detail if no detail)
                if (command.recent) {
                    const badge = document.createElement('span');
                    badge.className = 'recent-badge';
                    badge.textContent = 'Recent';
                    div.appendChild(badge);
                }

                // Detail (example)
                if (command.example) {
                    const detailDiv = document.createElement('div');
                    detailDiv.className = 'result-detail';
                    const detailSpan = document.createElement('span');
                    detailSpan.className = 'result-detail-file';
                    detailSpan.textContent = 'Try: ' + command.example;
                    detailDiv.appendChild(detailSpan);
                    div.appendChild(detailDiv);
                }

                div.addEventListener('click', () => {
                    selectItem(index);
                });

                div.addEventListener('dblclick', () => {
                    vscode.postMessage({ type: 'runCommand', commandName: command.name });
                    searchInput.value = command.name + ' ';
                    searchInput.focus();
                    triggerSearchFromInput(searchInput.value);
                });

                resultsContainer.appendChild(div);
                visibleEntries.push({ kind: 'slash', command });
            });

            updateSummary();
        }

        function renderEmptyState() {
            resultsContainer.textContent = '';
            
            const messageDiv = document.createElement('div');
            messageDiv.className = 'empty-state';
            messageDiv.textContent = "No results found for '" + searchInput.value + "'.";
            const actionsDiv = document.createElement('div');
            actionsDiv.className = 'empty-state-actions';

            // Clear Search button
            const clearBtn = document.createElement('button');
            clearBtn.className = 'empty-state-btn';
            clearBtn.setAttribute('data-empty-action', 'clear');
            clearBtn.innerHTML = '<i class="codicon codicon-clear-all"></i> Clear Search';
            actionsDiv.appendChild(clearBtn);

            // Show Recent History button
            const recentBtn = document.createElement('button');
            recentBtn.className = 'empty-state-btn';
            recentBtn.setAttribute('data-empty-action', 'recent');
            recentBtn.innerHTML = '<i class="codicon codicon-history"></i> Show Recent History';
            actionsDiv.appendChild(recentBtn);

            // Switch to Global Search button (if not already global)
            if (currentScope !== 'everything') {
                const globalBtn = document.createElement('button');
                globalBtn.className = 'empty-state-btn';
                globalBtn.setAttribute('data-empty-action', 'global');
                globalBtn.innerHTML = '<i class="codicon codicon-search"></i> Switch to Global Search';
                actionsDiv.appendChild(globalBtn);
            }

            // Search in Files (Native) button
            const nativeBtn = document.createElement('button');
            nativeBtn.className = 'empty-state-btn';
            nativeBtn.setAttribute('data-empty-action', 'native');
            nativeBtn.innerHTML = '<i class="codicon codicon-search-fuzzy"></i> Search in Files (Native)';
            actionsDiv.appendChild(nativeBtn);

            // Rebuild Index button
            const rebuildBtn = document.createElement('button');
            rebuildBtn.className = 'empty-state-btn';
            rebuildBtn.setAttribute('data-empty-action', 'rebuild');
            rebuildBtn.innerHTML = '<i class="codicon codicon-refresh"></i> Rebuild Index';
            actionsDiv.appendChild(rebuildBtn);

            // Clear Index Cache button
            const clearCacheBtn = document.createElement('button');
            clearCacheBtn.className = 'empty-state-btn';
            clearCacheBtn.setAttribute('data-empty-action', 'clear-cache');
            clearCacheBtn.innerHTML = '<i class="codicon codicon-trash"></i> Clear Index Cache';
            actionsDiv.appendChild(clearCacheBtn);

            // Configure Settings button
            const settingsBtn = document.createElement('button');
            settingsBtn.className = 'empty-state-btn';
            settingsBtn.setAttribute('data-empty-action', 'settings');
            settingsBtn.innerHTML = '<i class="codicon codicon-settings-gear"></i> Configure Settings';
            actionsDiv.appendChild(settingsBtn);

            resultsContainer.appendChild(actionsDiv);

            resultsContainer.querySelectorAll('[data-empty-action]').forEach((button) => {
                button.addEventListener('click', () => {
                    const action = button.getAttribute('data-empty-action');
                    if (action === 'clear') {
                        searchInput.value = '';
                        currentScope = 'everything';
                        userScope = 'everything';
                        updateScopeButtons();
                        triggerSearchFromInput('');
                        searchInput.focus();
                        showStatus('Search and filters cleared');
                        return;
                    }
                    if (action === 'recent') {
                        vscode.postMessage({ type: 'showRecentHistory' });
                        return;
                    }
                    if (action === 'global') {
                        switchToGlobal();
                        return;
                    }
                    if (action === 'native') {
                        copyNativeSearch();
                        return;
                    }
                    if (action === 'rebuild') {
                        rebuildIndex();
                        return;
                    }
                    if (action === 'clear-cache') {
                        vscode.postMessage({ type: 'clearCache' });
                        showStatus('Clearing index cache...');
                        return;
                    }
                    if (action === 'settings') {
                        vscode.postMessage({ type: 'openSettings' });
                    }
                });
            });
        }

        function renderHistoryToolbar() {
            const toolbar = document.createElement('div');
            toolbar.className = 'empty-state-actions';

            if (confirmClearHistory) {
                toolbar.innerHTML = '\
                    <button class="empty-state-btn" data-history-action="confirm-clear"><i class="codicon codicon-trash"></i> Confirm Clear History</button>\
                    <button class="empty-state-btn" data-history-action="cancel-clear"><i class="codicon codicon-clear-all"></i> Cancel</button>\
                ';
            } else {
                toolbar.innerHTML = '\
                    <button class="empty-state-btn" data-history-action="clear"><i class="codicon codicon-trash"></i> Clear Recent History</button>\
                ';
            }

            toolbar.querySelectorAll('[data-history-action]').forEach((button) => {
                button.addEventListener('click', () => {
                    const action = button.getAttribute('data-history-action');
                    if (action === 'clear') {
                        confirmClearHistory = true;
                        renderResults();
                        return;
                    }
                    if (action === 'cancel-clear') {
                        confirmClearHistory = false;
                        renderResults();
                        return;
                    }
                    if (action === 'confirm-clear') {
                        confirmClearHistory = false;
                        vscode.postMessage({ type: 'clearHistory' });
                    }
                });
            });

            resultsContainer.appendChild(toolbar);
            updateSummary();
        }

        function renderResultActions(item, container) {
            if (item.type === 'command') {
                return;
            }

            const symbolTypes = new Set(['class', 'interface', 'enum', 'function', 'method', 'property', 'variable']);
            const fileTypes = new Set(['file', 'text']);

            const copyPathBtn = document.createElement('button');
            copyPathBtn.className = 'result-action-btn';
            copyPathBtn.setAttribute('data-action', 'copyPath');
            copyPathBtn.title = 'Copy Path';
            copyPathBtn.setAttribute('aria-label', 'Copy Path');
            copyPathBtn.innerHTML = '<i class="codicon codicon-copy"></i>';
            container.appendChild(copyPathBtn);

            if (symbolTypes.has(item.type)) {
                const copyRefBtn = document.createElement('button');
                copyRefBtn.className = 'result-action-btn';
                copyRefBtn.setAttribute('data-action', 'copyReference');
                copyRefBtn.title = 'Copy Reference';
                copyRefBtn.setAttribute('aria-label', 'Copy Reference');
                copyRefBtn.innerHTML = '<i class="codicon codicon-references"></i>';
                container.appendChild(copyRefBtn);
            }

            if (fileTypes.has(item.type)) {
                const copyRelPathBtn = document.createElement('button');
                copyRelPathBtn.className = 'result-action-btn';
                copyRelPathBtn.setAttribute('data-action', 'copyRelativePath');
                copyRelPathBtn.title = 'Copy Relative Path';
                copyRelPathBtn.setAttribute('aria-label', 'Copy Relative Path');
                copyRelPathBtn.innerHTML = '<i class="codicon codicon-file-submodule"></i>';
                container.appendChild(copyRelPathBtn);
            }

            const openSideBtn = document.createElement('button');
            openSideBtn.className = 'result-action-btn';
            openSideBtn.setAttribute('data-action', 'openSide');
            openSideBtn.title = 'Open to the Side';
            openSideBtn.setAttribute('aria-label', 'Open to the Side');
            openSideBtn.innerHTML = '<i class="codicon codicon-split-horizontal"></i>';
            container.appendChild(openSideBtn);

            if (fileTypes.has(item.type)) {
                const revealBtn = document.createElement('button');
                revealBtn.className = 'result-action-btn';
                revealBtn.setAttribute('data-action', 'reveal');
                revealBtn.title = 'Reveal in Explorer';
                revealBtn.setAttribute('aria-label', 'Reveal in Explorer');
                revealBtn.innerHTML = '<i class="codicon codicon-folder-opened"></i>';
                container.appendChild(revealBtn);
            }

            if (recentHistoryMode) {
                const removeHistoryBtn = document.createElement('button');
                removeHistoryBtn.className = 'result-action-btn';
                removeHistoryBtn.setAttribute('data-action', 'removeHistory');
                removeHistoryBtn.title = 'Remove from History';
                removeHistoryBtn.setAttribute('aria-label', 'Remove from History');
                removeHistoryBtn.innerHTML = '<i class="codicon codicon-trash"></i>';
                container.appendChild(removeHistoryBtn);
            }
        }

        function renderHighlightedLabel(name, highlights) {
            const span = document.createElement('span');
            if (!highlights || highlights.length === 0) {
                span.textContent = name;
                return span;
            }
            // highlights is array of [start, end] pairs (end exclusive)
            const ranges = highlights.slice().sort((a, b) => a[0] - b[0]);
            let pos = 0;
            for (const [start, end] of ranges) {
                if (start > pos) {
                    span.appendChild(document.createTextNode(name.slice(pos, start)));
                }
                const matchSpan = document.createElement('b');
                matchSpan.className = 'result-match';
                matchSpan.textContent = name.slice(start, end);
                span.appendChild(matchSpan);
                pos = end;
            }
            if (pos < name.length) {
                span.appendChild(document.createTextNode(name.slice(pos)));
            }
            return span;
        }

        function getIconForItemType(type) {
            const iconMap = {
                'class': 'symbol-class',
                'interface': 'symbol-interface',
                'enum': 'symbol-enum',
                'function': 'symbol-function',
                'method': 'symbol-method',
                'property': 'symbol-property',
                'variable': 'symbol-variable',
                'file': 'file',
                'text': 'whole-word',
                'command': 'run',
                'endpoint': 'globe',
            };
            return iconMap[type] || 'symbol-misc';
        }

        const workspaceFolders = ${WORKSPACE_FOLDERS};

        function getRelativePath(filePath) {
            // Normalize separators to forward slash
            const normalized = filePath.replace(/\\\\/g, '/').replace(/\\/g, '/');
            for (const folder of workspaceFolders) {
                // Normalize folder path and ensure trailing slash
                const normalizedFolder = folder.replace(/\\\\/g, '/').replace(/\\/g, '/').replace(/\/$/, '') + '/';
                if (normalized.startsWith(normalizedFolder)) {
                    return normalized.slice(normalizedFolder.length);
                }
            }
            // Fallback: just return the path as-is (or filename if very long)
            return normalized;
        }

        function selectItem(index) {
            const items = document.querySelectorAll('.result-item');
            if (selectedIndex >= 0) items[selectedIndex].classList.remove('selected');
            selectedIndex = index;
            if (selectedIndex >= 0) {
                items[selectedIndex].classList.add('selected');
                items[selectedIndex].scrollIntoView({ block: 'nearest' });
            }
        }

        function getEffectiveSelection(index) {
            if (index < 0 || index >= visibleEntries.length) {
                return null;
            }
            return visibleEntries[index];
        }

        searchInput.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowDown') {
                e.preventDefault();
                selectItem(Math.min(selectedIndex + 1, visibleEntries.length - 1));
                const selection = getEffectiveSelection(selectedIndex);
                if (selection && selection.kind === 'result') {
                    vscode.postMessage({ type: 'preview', result: selection.result });
                }
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                selectItem(Math.max(selectedIndex - 1, 0));
                const selection = getEffectiveSelection(selectedIndex);
                if (selection && selection.kind === 'result') {
                    vscode.postMessage({ type: 'preview', result: selection.result });
                }
            } else if (e.key === 'Enter') {
                const selection = getEffectiveSelection(selectedIndex);
                if (selection && selection.kind === 'result') {
                    vscode.postMessage({ type: 'open', result: selection.result });
                } else if (selection && selection.kind === 'slash') {
                    vscode.postMessage({ type: 'runCommand', commandName: selection.command.name });
                    searchInput.value = selection.command.name + ' ';
                    searchInput.focus();
                    triggerSearchFromInput(searchInput.value);
                }
            }
        });

        function tryTip() {
            const tips = [
                { label: 'Search Symbols', action: '# ', desc: 'Find methods & variables' },
                { label: 'Run Commands', action: '> ', desc: 'Execute VS Code commands' },
                { label: 'Find Modified Files', action: '/m ', desc: 'See changed files' },
                { label: 'Search Open Files', action: '/o ', desc: 'Search open tabs' },
                { label: 'Search Types', action: '/t ', desc: 'Find classes & interfaces' },
                { label: 'Search Text', action: '/txt ', desc: 'Search file content' },
                { label: 'Find Endpoints', action: '/e ', desc: 'Search API routes' },
            ];
            const tip = tips[Math.floor(Math.random() * tips.length)];
            searchInput.value = tip.action;
            searchInput.focus();
            showStatus('Pro tip loaded: ' + tip.label + ' (' + tip.desc + ')');
        }

        function switchToGlobal() {
            const text = searchInput.value;
            let stripLen = 0;
            if (text.length > 0 && text[0] === '/') {
                let end = text.indexOf(' ');
                if (end === -1) end = text.length;
                stripLen = end;
            }
            searchInput.value = '/all ' + text.slice(stripLen);
            currentScope = 'everything';
            userScope = 'everything';
            updateScopeButtons();
            vscode.postMessage({
                type: 'search',
                query: searchInput.value,
                scope: currentScope
            });
        }

        function copyNativeSearch() {
            vscode.postMessage({ type: 'nativeSearch', query: searchInput.value });
        }

        function rebuildIndex() {
            vscode.postMessage({ type: 'rebuildIndex' });
            showStatus('Rebuilding index...');
        }

        async function runCommand(commandName) {
            vscode.postMessage({ type: 'runCommand', commandName });
        }

        searchInput.focus();
        triggerSearchFromInput(searchInput.value || '');
        updateSummary();
    </script>
</body>
